<section class="contact" id="contact">
  <div class="contact__container">
    <h2 class="contact__title">Get in Touch</h2>
    <p class="contact__subtitle">Have a question or want to work together? Drop us a message.</p>
    <form class="form contact__form" action="#" method="post">
      <div class="form__row">
        <div class="form__group">
          <label class="form__label" for="contact-name">Name</label>
          <input class="form__input" type="text" id="contact-name" name="name" placeholder="Your name" required>
        </div>
        <div class="form__group">
          <label class="form__label" for="contact-email">Email</label>
          <input class="form__input" type="email" id="contact-email" name="email" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form__group">
        <label class="form__label" for="contact-subject">Subject</label>
        <input class="form__input" type="text" id="contact-subject" name="subject" placeholder="How can we help?">
      </div>
      <div class="form__group">
        <label class="form__label" for="contact-message">Message</label>
        <textarea class="form__textarea" id="contact-message" name="message" rows="5" placeholder="Your message..." required></textarea>
      </div>
      <button class="form__submit button button--primary" type="submit">Send Message</button>
    </form>
  </div>
</section>
